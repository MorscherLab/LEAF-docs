name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for VitePress lastUpdated git timestamps

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install D2
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - name: Check for retired `leaf serve` references
        run: |
          # Glossary keeps `leaf serve` as a deprecated-alias entry; everywhere
          # else fails the build. `--exclude` matches basename, not path, so
          # `glossary.md` is the right pattern here.
          if grep -rEn 'leaf serve' --include='*.md' \
                 --exclude-dir=node_modules \
                 --exclude-dir=docs \
                 --exclude='glossary.md' .; then
            echo "::error::Retired command 'leaf serve' found above. Use 'leaf webui run' instead."
            exit 1
          fi

      - name: Build VitePress site
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
